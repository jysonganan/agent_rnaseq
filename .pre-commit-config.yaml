repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0
          - sqlalchemy>=2.0.30
          - sqlalchemy[mypy]>=2.0.30
          - types-redis>=4.6.0
        args: [--ignore-missing-imports]

  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke test
        entry: pytest tests/ -x -q --tb=short
        language: system
        pass_filenames: false
        stages: [pre-push]
