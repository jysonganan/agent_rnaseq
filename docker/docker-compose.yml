services:
  db:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_USER: agent_rnaseq
      POSTGRES_PASSWORD: agent_rnaseq_dev
      POSTGRES_DB: agent_rnaseq
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_rnaseq"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../.env.docker
    environment:
      DATABASE_URL: postgresql://agent_rnaseq:agent_rnaseq_dev@db:5432/agent_rnaseq
      REDIS_URL: redis://redis:6379/0
      OUTPUT_ROOT: /tmp/agent_rnaseq
    volumes:
      - ../src:/app/src:ro
      - artifacts:/tmp/agent_rnaseq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  arq-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: ["python", "-m", "arq", "src.worker.WorkerSettings"]
    env_file:
      - ../.env.docker
    environment:
      DATABASE_URL: postgresql://agent_rnaseq:agent_rnaseq_dev@db:5432/agent_rnaseq
      REDIS_URL: redis://redis:6379/0
      OUTPUT_ROOT: /tmp/agent_rnaseq
    volumes:
      - ../src:/app/src:ro
      - artifacts:/tmp/agent_rnaseq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      STREAMLIT_DATA_DIR: /tmp/agent_rnaseq
    volumes:
      - ../src:/app/src:ro
      - artifacts:/tmp/agent_rnaseq:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

  nextflow:
    image: nextflow/nextflow:23.10.1
    volumes:
      - ../nextflow:/app/nextflow:ro
      - /tmp/nextflow_work:/tmp/nextflow_work
    working_dir: /app
    entrypoint: ["nextflow"]
    command: ["--help"]
    profiles:
      - tools

volumes:
  db_data:
  artifacts:
