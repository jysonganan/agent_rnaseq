# docker-compose.test.yml — override for integration tests
# Runs tests against SQLite (no PostgreSQL needed), mocked AWS credentials,
# and a real Redis instance (required for ARQ queue + WebSocket streaming).
#
# Usage:
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.test.yml \
#                  up --abort-on-container-exit --exit-code-from test-runner

services:
  db:
    # Skip PostgreSQL; tests use SQLite in-memory via conftest fixtures.
    profiles:
      - disabled

  api:
    # Not needed for unit/integration test run.
    profiles:
      - disabled

  arq-worker:
    profiles:
      - disabled

  streamlit:
    profiles:
      - disabled

  redis:
    # Keep Redis running — integration tests that exercise ARQ or WebSocket
    # streaming need a real Redis. Tests that don't need it mock it.
    profiles: []

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: ["pytest", "tests/", "-v", "--tb=short"]
    environment:
      # SQLite in-memory — overrides any DATABASE_URL from .env
      DATABASE_URL: sqlite:///:memory:
      REDIS_URL: redis://redis:6379/1
      OUTPUT_ROOT: /tmp/agent_rnaseq_test
      # Fake AWS credentials so boto3 / moto tests don't try real AWS
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-east-1
      AWS_SECURITY_TOKEN: testing
      AWS_SESSION_TOKEN: testing
      # Suppress OpenAI calls in tests
      OPENAI_API_KEY: sk-test-placeholder
    volumes:
      - ../src:/app/src:ro
      - ../tests:/app/tests:ro
    depends_on:
      redis:
        condition: service_healthy
